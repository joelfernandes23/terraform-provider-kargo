repos:
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-vet
        exclude: ^tools/
      - id: go-mod-tidy

  - repo: https://github.com/golangci/golangci-lint
    rev: v2.1.6
    hooks:
      - id: golangci-lint
        args: [--timeout=5m]

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.99.2
    hooks:
      - id: terraform_fmt
