kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: kargo-dev
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 31443
        hostPort: 31443
        protocol: TCP
      # ArgoCD UI — optional, useful for debugging
      - containerPort: 31080
        hostPort: 31080
        protocol: TCP
