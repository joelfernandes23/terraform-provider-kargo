name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.26"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build -v ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.26"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Run tests
        run: go test -v -count=1 -parallel=4 -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
        if: matrix.go-version == '1.26'

  acceptance:
    name: Acceptance Tests
    runs-on: ubuntu-latest
    needs: [build, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: kargo-test
          config: test/kind-config.yaml

      - name: Install cert-manager
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
          kubectl wait --for=condition=Available deployment/cert-manager -n cert-manager --timeout=120s
          kubectl wait --for=condition=Available deployment/cert-manager-webhook -n cert-manager --timeout=120s
          kubectl wait --for=condition=Available deployment/cert-manager-cainjector -n cert-manager --timeout=120s

      - name: Install ArgoCD
        run: |
          kubectl create namespace argocd
          kubectl apply -n argocd --server-side --force-conflicts \
            -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
          kubectl wait --for=condition=Available deployment/argocd-server -n argocd --timeout=300s

      - name: Install Kargo
        run: |
          kubectl create namespace kargo
          helm install kargo oci://ghcr.io/akuity/kargo-charts/kargo \
            --namespace kargo \
            --values test/kargo-values.yaml \
            --wait --timeout 300s

      - name: Run acceptance tests
        env:
          TF_ACC: "1"
          KARGO_API_URL: "https://localhost:31443"
          KARGO_ADMIN_PASSWORD: "admin"
          KARGO_INSECURE_SKIP_TLS_VERIFY: "true"
        run: go test -v -count=1 -parallel=4 -timeout 30m -coverprofile=coverage-acc.out ./...

      - name: Upload acceptance coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage-acc.out
          flags: acceptance
