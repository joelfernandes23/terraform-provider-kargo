name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -v ./...

  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: go vet
        run: go vet ./...

      - name: go fmt
        run: |
          gofmt -l .
          test -z "$(gofmt -l .)"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || echo "::warning::govulncheck found vulnerabilities — review output above"

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [build, verify, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -v -count=1 -parallel=4 -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: ${{ !cancelled() }}
        with:
          files: coverage.out
          flags: unit
          fail_ci_if_error: false

  acceptance:
    name: Acceptance Tests
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: kargo-test
          config: test/kind-config.yaml

      - name: Install cert-manager
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
          kubectl wait --for=condition=Available deployment/cert-manager -n cert-manager --timeout=120s
          kubectl wait --for=condition=Available deployment/cert-manager-webhook -n cert-manager --timeout=120s
          kubectl wait --for=condition=Available deployment/cert-manager-cainjector -n cert-manager --timeout=120s

      - name: Install ArgoCD
        run: |
          kubectl create namespace argocd
          kubectl apply -n argocd --server-side --force-conflicts \
            -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
          kubectl wait --for=condition=Available deployment/argocd-server -n argocd --timeout=300s

      - name: Install Kargo
        env:
          KARGO_VERSION: "1.9.5"
        run: |
          kubectl create namespace kargo
          helm install kargo oci://ghcr.io/akuity/kargo-charts/kargo \
            --version "$KARGO_VERSION" \
            --namespace kargo \
            --values test/kargo-values.yaml \
            --wait --timeout 300s

      - name: Run acceptance tests
        env:
          TF_ACC: "1"
          KARGO_API_URL: "https://localhost:31443"
          KARGO_ADMIN_PASSWORD: "admin"
          KARGO_INSECURE_SKIP_TLS_VERIFY: "true"
        run: go test -v -count=1 -parallel=4 -race -timeout 30m -coverprofile=coverage-acc.out -covermode=atomic ./...

      - name: Upload acceptance coverage
        uses: codecov/codecov-action@v5
        if: ${{ !cancelled() }}
        with:
          files: coverage-acc.out
          flags: acceptance
          fail_ci_if_error: false
